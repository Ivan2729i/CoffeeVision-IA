{% load static %}

<section class="bg-white rounded-2xl border border-[#e8ddd4] shadow-sm overflow-hidden">

  <!-- Header -->
  <div class="px-6 py-5 border-b border-[#eadfd6]">
    <h3 class="text-xl font-bold text-[#2b1d16]">Biblioteca de Defectos</h3>
    <p class="text-sm text-black mt-1">
      Libros técnicos de referencia sobre defectos del café verde y evaluación visual de calidad.
    </p>
  </div>

  <!-- Content -->
  <div class="p-6 space-y-5 max-h-[calc(100vh-210px)] overflow-y-auto">

    <!-- Selector -->
    <div class="bg-[#fbf7f2] border border-[#eadfd6] rounded-2xl p-4">
      <label class="block text-xs font-bold uppercase text-black mb-2">
        Seleccionar libro de referencia
      </label>

      <select id="libraryPdfSelect"
              class="w-full rounded-xl border border-[#e8ddd4] bg-white px-4 py-3 text-sm text-[#2b1d16] focus:outline-none focus:ring-2 focus:ring-[#c0895e]/40">
        <option value="{% static 'pdfs/coffee_defects_book_1.pdf' %}">
          SCA Guía de Defectos del Café
        </option>

        <option value="{% static 'pdfs/coffee_defects_book_2.pdf' %}">
          SCA Guía de Defectos del Café Verde
        </option>
      </select>
    </div>

    <!-- Viewer -->
    <div class="border border-[#eadfd6] rounded-2xl overflow-hidden bg-[#f8f3ed]">

      <!-- Toolbar -->
      <div class="grid grid-cols-1 lg:grid-cols-3 items-center gap-3 px-4 py-3 border-b border-[#eadfd6] bg-white">

        <!-- Left: Title -->
        <div>
          <h4 id="libraryPdfTitle" class="font-bold text-[#2b1d16]">
            SCA Guía de Defectos del Café
          </h4>
          <p class="text-xs text-[#4b3326]">
            Visor integrado del documento técnico.
          </p>
        </div>

        <!-- Center: Controls -->
        <div class="flex flex-wrap items-center justify-center gap-2">
          <button id="pdfPrev"
                  class="btn-shine px-3 py-2 rounded-xl border border-[#e8ddd4] text-sm font-semibold text-[#2b1d16] hover:bg-[#fbf7f2] transition">
            Anterior
          </button>

          <span class="text-sm text-[#4b3326]">
            Página <span id="pdfPageNum">1</span> / <span id="pdfPageCount">1</span>
          </span>

          <button id="pdfNext"
                  class="btn-shine px-3 py-2 rounded-xl border border-[#e8ddd4] text-sm font-semibold text-[#2b1d16] hover:bg-[#fbf7f2] transition">
            Siguiente
          </button>

          <button id="pdfZoomOut"
                  class="btn-shine px-3 py-2 rounded-xl border border-[#e8ddd4] text-sm font-semibold text-[#2b1d16] hover:bg-[#fbf7f2] transition">
            −
          </button>

          <span id="pdfZoomLabel" class="text-sm text-[#4b3326] min-w-[52px] text-center">
            100%
          </span>

          <button id="pdfZoomIn"
                  class="btn-shine px-3 py-2 rounded-xl border border-[#e8ddd4] text-sm font-semibold text-[#2b1d16] hover:bg-[#fbf7f2] transition">
            +
          </button>

          <button id="pdfBookMode"
                  class="btn-shine px-3 py-2 rounded-xl border border-[#c0895e] text-sm font-semibold text-[#2b1d16] hover:bg-[#fbf7f2] transition">
            Modo libro
          </button>
        </div>

        <!-- Right: Open PDF -->
        <div class="flex justify-start lg:justify-end">
          <a id="libraryPdfOpen"
             href="{% static 'pdfs/coffee_defects_book_1.pdf' %}"
             target="_blank"
             class="btn-shine px-4 py-2 rounded-xl bg-[#2b1d16] text-white text-sm font-semibold hover:bg-[#3a261c] transition">
            Open PDF
          </a>
        </div>
      </div>

      <!-- Viewer Area -->
      <div class="relative h-[720px] overflow-auto bg-[#f3eee8] p-5">

        <div id="pdfLoading"
             class="absolute inset-0 flex items-center justify-center text-[#4b3326] font-semibold bg-[#f8f3ed]/80 z-10">
          Cargando documento...
        </div>

        <!-- Normal PDF.js view -->
        <div id="normalPdfView" class="flex justify-center">
          <canvas id="pdfCanvas"
                  class="bg-white rounded-xl shadow-sm border border-[#eadfd6]">
          </canvas>
        </div>

        <!-- Book view -->
        <div id="bookPdfView" class="hidden w-full flex justify-center py-4">
          <div id="pdfBook" class="shadow-xl"></div>
        </div>

      </div>

    </div>

  </div>
</section>
